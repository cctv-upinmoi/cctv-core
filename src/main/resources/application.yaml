server:
  port: 8080
  servlet:
    context-path: /cctv-core

spring:
  application:
    name: cctv-core

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: '${KC_URI:http://localhost:8081/realms/smart-cctv}'

  datasource:
    url: 'jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:smart_cctv}'
    username: '${POSTGRES_USER:postgres}'
    password: '${POSTGRES_PASSWORD:postgres}'
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

kafka:
  bootstrap-servers: '${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}'
  consumer:
    group-id: cctv-core
  topics:
    intrusion-events: '${KAFKA_TOPIC_INTRUSION:intrusion-alerts}'
    modify-cctv: '${KAFKA_TOPIC_MODIFY:modify-zone-cctv}'
    notification-dispatch: '${KAFKA_TOPIC_NOTIFICATION:notification-dispatch}'

outbox:
  relay:
    poll-interval-ms: '${OUTBOX_POLL_INTERVAL_MS:2000}'   # chu kỳ relay quét event PENDING
    batch-size: '${OUTBOX_BATCH_SIZE:100}'                # số event xử lý mỗi lượt
    max-retries: '${OUTBOX_MAX_RETRIES:10}'               # quá ngưỡng -> đánh dấu FAILED
  cleanup:
    enabled: '${OUTBOX_CLEANUP_ENABLED:true}'
    retention-hours: '${OUTBOX_RETENTION_HOURS:168}'      # xóa event PUBLISHED cũ hơn (mặc định 7 ngày)
    interval-ms: '${OUTBOX_CLEANUP_INTERVAL_MS:3600000}'  # chu kỳ dọn dẹp (mặc định 1 giờ)

idp:
  realm: '${KC_REALM:smart-cctv}'
  url: '${KC_URL:http://localhost:8081}'
  client-id: '${KC_CLIENT_ID:cctv-core}'
  client-secret: '${KC_CLIENT_SECRET:}'

stream:
  app:
    base:
      url: '${GO2RTC_URL:localhost:1984}'

cloud-storage:
  r2:
    account-id: '${R2_ACCOUNT_ID}'
    access-key: '${R2_ACCESS_KEY}'
    secret-key: '${R2_SECRET_KEY}'
    bucket-name: '${R2_BUCKET_NAME:smart-cctv}'
    public-url: '${R2_PUBLIC_URL}'

camera:
  health-check:
    interval-ms: '${CAMERA_HEALTH_INTERVAL_MS:60000}'

app:
  storage:
    type: '${STORAGE_TYPE:local}'
    base-url: '${STORAGE_BASE_URL:http://localhost:8080/cctv-core/snapshots}'
  snapshot:
    dir: '${SNAPSHOT_DIR:./snapshots}'
